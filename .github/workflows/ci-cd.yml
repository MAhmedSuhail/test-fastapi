name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Print secret (masked by GitHub)
        run: echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"

      - name: Build Docker image
        run: docker build -t hello-fastapi .

      - name: Run container with secret and health check
        run: |
          docker run -d -p 8000:8000 --name app -e SECRET_KEY=${{ secrets.SECRET_KEY }} hello-fastapi
          sleep 3
          curl -f http://localhost:8000
          docker stop app
